name: CI/CD Pipeline

on:
  push:
    branches:
      - main

# ─── Variables globales ───────────────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/myapp

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Tests unitaires
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  unit-tests:
    name: "Tests unitaires"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Exécution des tests unitaires
        run: npm test

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Tests E2E
# ══════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: "Tests E2E"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Démarrage du serveur en arrière-plan
        run: |
          npm start &
          # Attendre que le serveur soit prêt (max 15s)
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/health && break
            echo "Attente du serveur... ($i/15)" # 15 secondes max comme précisé plus tôt
            sleep 1
          done

      - name: Exécution des tests E2E
        run: npm run test:e2e
        env:
          APP_URL: http://localhost:3000

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Build & Push Docker Hub
# ══════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "Build & Push Docker Hub"
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]  # ← uniquement si les 2 jobs précédents sont OK

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraction des métadonnées (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4 — Déploiement sur VM Azure via SSH
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Déploiement Azure VM"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déploiement via SSH (idempotent)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest"

            echo "=== Pull de la nouvelle image ==="
            docker pull "$IMAGE"

            echo "=== Arrêt et suppression du conteneur existant (si présent) ==="
            docker stop myapp 2>/dev/null || true
            docker rm   myapp 2>/dev/null || true

            echo "=== Démarrage du nouveau conteneur ==="
            docker run -d \
              --name myapp \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE"

            echo "=== Healthcheck post-déploiement ==="
            sleep 5
            for i in $(seq 1 10); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Application opérationnelle (HTTP $STATUS)"
                exit 0
              fi
              echo "Attente... ($i/10) — HTTP $STATUS"
              sleep 3
            done

            echo "L'application ne répond pas après le déploiement"
            exit 1

      - name: Vérification finale depuis GitHub Actions
        run: |
          echo "Vérification HTTP depuis le runner GitHub..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            http://${{ secrets.AZURE_VM_HOST }}:3000/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Healthcheck externe OK (HTTP $STATUS)"
          else
            echo "Healthcheck externe : HTTP $STATUS (le port 3000 doit être ouvert dans Azure NSG)"
          fi
